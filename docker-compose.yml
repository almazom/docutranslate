services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    expose:
      - "8010"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import os,sys,urllib.request; port=os.environ.get('DOCUTRANSLATE_PORT','8010'); sys.exit(0 if urllib.request.urlopen(f'http://127.0.0.1:{port}/health').status == 200 else 1)
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - app-output:/app/output
      - app-data:/app/data/tasks

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${DOCUTRANSLATE_HTTP_PORT:-80}:80"
      - "${DOCUTRANSLATE_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl
      - ./nginx/www/certbot:/var/www/certbot
      - ./nginx/letsencrypt:/etc/letsencrypt

  certbot:
    image: certbot/certbot:latest
    profiles:
      - tools
    volumes:
      - ./nginx/letsencrypt:/etc/letsencrypt
      - ./nginx/www/certbot:/var/www/certbot

volumes:
  app-output:
  app-data:
