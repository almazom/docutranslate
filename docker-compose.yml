services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    expose:
      - "8010"
    restart: unless-stopped
    volumes:
      - app-output:/app/output
      - app-data:/app/data/tasks

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${DOCUTRANSLATE_HTTP_PORT:-80}:80"
      - "${DOCUTRANSLATE_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl
      - ./nginx/www/certbot:/var/www/certbot
      - ./nginx/letsencrypt:/etc/letsencrypt

  certbot:
    image: certbot/certbot:latest
    profiles:
      - tools
    volumes:
      - ./nginx/letsencrypt:/etc/letsencrypt
      - ./nginx/www/certbot:/var/www/certbot

volumes:
  app-output:
  app-data:
